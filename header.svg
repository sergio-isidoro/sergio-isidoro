<svg fill="none" width="100%" height="50px" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .wrapper {
          height: 100%;
          display: grid;
          place-items: center;
        }

        .text {
          width: 7ch;
          white-space: nowrap;
          overflow: hidden;
          border-right: 2px solid;
          font-family: monospace;
          font-size: 3em;
          /* Gradiente Masculino / Tech: Azul Ciano -> Azul Royal -> Cinza Aço */
          background: linear-gradient(90deg, 
            rgba(0,255,255,1) 0%, 
            rgba(30,144,255,1) 50%, 
            rgba(112,128,144,1) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;

          animation: typing 1.5s steps(7) infinite, blink 0.5s step-end infinite alternate;
        }

        @keyframes typing {
          0%   { width: 0 }
          30%  { width: 7ch }  /* Escreve */
          80%  { width: 7ch }  /* Pausa para leitura */
          100% { width: 0 }    /* Apaga */
        }

        @keyframes blink {
          from, to { border-color: transparent }
          50% { border-color: #1E90FF; } /* Cursor acompanha o azul */
        }
      </style>
      <div class="wrapper">
        <div class="text">
          Welcome
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
